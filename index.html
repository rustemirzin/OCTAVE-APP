<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="OCTAVE" />
  <meta name="theme-color" content="#08080A" />
  <meta name="description" content="O.C.T.A.V.E. — интерактивное демо мобильного приложения закрытого сообщества: нетворкинг, репутация, рекомендации, форум-группы, мероприятия, сделки и финансы." />
  <title>O.C.T.A.V.E. — демо приложения</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" type="image/png" href="icon-192.png" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
</head>
<body>
  <!-- Decorative ambient background for the desktop stage -->
  <div class="stage-glow"></div>

  <div class="stage">
    <header class="stage-head">
      <div class="stage-brand">
        <span class="stage-omega">Ω</span>
        <div>
          <div class="stage-title">O.C.T.A.V.E.</div>
          <div class="stage-sub">Интерактивное демо · мобильное приложение сообщества</div>
        </div>
      </div>
      <div class="stage-hint" id="stageHint">Нажимайте на карточки, вкладки и кнопки — всё кликабельно</div>
      <a class="stage-admin" href="admin.html">⌗ Кабинет администрации сообщества →</a>
    </header>

    <!-- The phone -->
    <div class="device-wrap">
      <div class="device" id="device">
        <div class="device-notch"></div>
        <div class="device-screen">
          <div class="statusbar" id="statusbar">
            <span class="sb-time">9:41</span>
            <span class="sb-icons">
              <svg viewBox="0 0 18 12" width="18" height="12" aria-hidden="true"><g fill="currentColor"><rect x="0" y="7" width="3" height="5" rx="1"/><rect x="5" y="4.5" width="3" height="7.5" rx="1"/><rect x="10" y="2" width="3" height="10" rx="1"/><rect x="15" y="0" width="3" height="12" rx="1" opacity="0.35"/></g></svg>
              <svg viewBox="0 0 18 13" width="18" height="13" aria-hidden="true"><path fill="currentColor" d="M9 2.4c2.6 0 5 1 6.8 2.7l1.4-1.5C15 1.4 12.1.2 9 .2S3 1.4.8 3.6l1.4 1.5C4 3.4 6.4 2.4 9 2.4Zm0 3.6c1.6 0 3 .6 4.1 1.6l1.4-1.5C13 4.4 11.1 3.6 9 3.6S5 4.4 3.5 6.1L4.9 7.6C6 6.6 7.4 6 9 6Zm0 3.5c.7 0 1.4.3 1.9.8L9 12.3 7.1 10.3c.5-.5 1.2-.8 1.9-.8Z"/></svg>
              <svg viewBox="0 0 26 13" width="26" height="13" aria-hidden="true"><rect x="0.5" y="0.5" width="22" height="12" rx="3.2" fill="none" stroke="currentColor" stroke-opacity="0.5"/><rect x="2" y="2" width="17" height="9" rx="1.8" fill="currentColor"/><rect x="23.5" y="4" width="2" height="5" rx="1" fill="currentColor" fill-opacity="0.5"/></svg>
            </span>
          </div>

          <main class="app" id="app"><!-- screens render here --></main>

          <nav class="tabbar" id="tabbar"></nav>

          <!-- overlay layers -->
          <div class="scrim" id="scrim"></div>
          <div class="sheet" id="sheet"></div>
          <div class="toast" id="toast"></div>
        </div>
        <div class="device-home"></div>
      </div>
    </div>

    <footer class="stage-foot">
      <span>Демо-прототип. Данные вымышленные, действия не отправляются на сервер.</span>
    </footer>
  </div>

  <script src="app.js"></script>
  <script>
    // register service worker for offline / installable PWA (ignored in non-secure contexts)
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
